<!doctype html>
<html>
  <head>
    <title>Expense List</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="listContainer">
      <div class="modeBox">
        <button onclick="darkMode()">🌙</button>
        <button onclick="lightMode()">☀️</button>
      </div>

      <h1>Expense List</h1>

      <hr />

      <h2>Total Expense : ₹ <span id="total">0</span></h2>

      <div class="controlBar">
        <label>Sort by Amount:</label>

        <select onchange="sortExpense(this.value)">
          <option value="">Select</option>

          <option value="low">Low → High</option>

          <option value="high">High → Low</option>
        </select>
      </div>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Edit</th>
            <th>Delete</th>
          </tr>
        </thead>

        <tbody id="table"></tbody>
      </table>

      <div id="editBox" class="editBox">
        <h3>Edit Expense</h3>

        <label>Name</label>
        <input type="text" id="editName" />

        <label>Amount</label>
        <input type="number" id="editAmount" />

        <label>Category</label>

        <select id="editCategory">
          <option>Food</option>
          <option>Travel</option>
          <option>Shopping</option>
          <option>Bills</option>
        </select>

        <label>Date</label>

        <input type="date" id="editDate" />

        <br /><br />

        <button onclick="updateExpense()">Update</button>

        <button onclick="closeEdit()">Cancel</button>
      </div>

      <br /><br />
      <a href="addExpense.html">
        <button class="navButton">← Add New Expense</button>
      </a>
    </div>

    <script src="expenseTracker.js"></script>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <title>Add Expense</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard-wrapper">
      <nav class="sidebar">
        <div class="logo">Tracker</div>
        <ul>
          <li><a href="index.html"> Home</a></li>
          <li><a href="addExpense.html" class="active"> Add Expense</a></li>
          <li><a href="listExpense.html"> All Expenses</a></li>
          <li><a href="monthlyReport.html"> Monthly Report</a></li>
        </ul>
        <div class="sidebar-mode">
          <button onclick="darkMode()">🌙</button>
          <button onclick="lightMode()">☀️</button>
        </div>
      </nav>

      <main class="main-content">
        <div class="container">
          <h1>Add Expense</h1>
          <hr />
          <form id="expenseForm">
            <label>Expense Name</label>
            <input type="text" id="name" required />

            <label>Amount</label>
            <input type="number" id="amount" required />

            <label>Category</label>
            <select id="category" required>
              <option value="">Select Category</option>
              <option>Food</option>
              <option>Travel</option>
              <option>Shopping</option>
              <option>Bills</option>
              <option>Entertainment</option>
              <option>Healthcare</option>
              <option>Other</option>
            </select>

            <label>Date</label>
            <input type="date" id="date" required />

            <button type="submit" style="background: #007bff; color: white">
              Add Expense
            </button>
          </form>
          <br />
          <a href="listExpense.html"
            ><button class="navButton">Go To Expense List →</button></a
          >
        </div>
      </main>
    </div>
    <script src="expenseTracker.js"></script>
  </body>
</html>
